name: Nav Eval

on:
  push:
    branches:
      - 'nav/dev-*'
    paths:
      - 'navigation'
      - 'navigation/**'
      - '.github/workflows/nav_eval.yml'
      - 'scripts/nav_test_runner.py'
      - 'scripts/ci_nav_test.sh'
      - 'scripts/nav_eval_contract.py'
      - 'scripts/nav_eval_manifest.py'
  workflow_dispatch:
    inputs:
      scenario:
        description: '测试场景 (all / A_straight_5m / custom)'
        required: false
        default: 'all'
      rebuild_mc:
        description: '强制重新构建 motion_control'
        type: boolean
        required: false
        default: false
      rebuild_nav:
        description: '强制重新构建 navigation'
        type: boolean
        required: false
        default: false

# Dedicated simulation resources must be serialized. Never cancel an evaluation
# whose run id may already have been handed to a local loop.
concurrency:
  group: nav-eval
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  nav-eval:
    runs-on: [self-hosted, linux]
    timeout-minutes: 40
    env:
      F1_EVAL_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      F1_REPORT_DIR: ${{ github.workspace }}/reports/${{ github.run_id }}-${{ github.run_attempt }}
      F1_CI_LOG_DIR: ${{ github.workspace }}/ci_logs/${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          # Build directories are kept on the dedicated runner. Source trees are
          # sanitized explicitly in the next step.
          clean: false

      - name: Verify source identity
        id: source
        shell: bash
        run: |
          set -euo pipefail
          git submodule update --init --recursive --force
          git submodule foreach --recursive \
            'git clean -ffd -e build/ -e install/ -e log/'

          F1_SHA="$(git rev-parse HEAD)"
          NAV_GITLINK_SHA="$(git ls-tree HEAD navigation | awk '{print $3}')"
          NAV_CHECKOUT_SHA="$(git -C navigation rev-parse HEAD)"
          MC_GITLINK_SHA="$(git ls-tree HEAD motion_control | awk '{print $3}')"
          MC_CHECKOUT_SHA="$(git -C motion_control rev-parse HEAD)"

          if [ "$F1_SHA" != "${{ github.sha }}" ]; then
            echo "::error::F1 checkout SHA mismatch: $F1_SHA != ${{ github.sha }}"
            exit 1
          fi
          if [ "$NAV_GITLINK_SHA" != "$NAV_CHECKOUT_SHA" ]; then
            echo "::error::navigation gitlink mismatch: $NAV_GITLINK_SHA != $NAV_CHECKOUT_SHA"
            exit 1
          fi
          if [ "$MC_GITLINK_SHA" != "$MC_CHECKOUT_SHA" ]; then
            echo "::error::motion_control gitlink mismatch: $MC_GITLINK_SHA != $MC_CHECKOUT_SHA"
            exit 1
          fi

          echo "f1_sha=$F1_SHA" >> "$GITHUB_OUTPUT"
          echo "nav_sha=$NAV_CHECKOUT_SHA" >> "$GITHUB_OUTPUT"
          echo "mc_sha=$MC_CHECKOUT_SHA" >> "$GITHUB_OUTPUT"
          echo "::notice::F1=$F1_SHA navigation=$NAV_CHECKOUT_SHA motion_control=$MC_CHECKOUT_SHA"

      - name: Verify f1ros environment
        id: environment
        shell: bash -il {0}
        run: |
          if ! type f1ros >/dev/null 2>&1; then
            echo "::error::登录 shell 中未找到 f1ros，请检查 Runner 用户的 shell 配置"
            exit 1
          fi
          if ! f1ros; then
            echo "::error::f1ros 环境激活失败"
            exit 1
          fi
          set -euo pipefail
          command -v python3
          command -v ros2
          python3 -c "import rclpy; print('rclpy ok')"
          echo "conda_environment=${CONDA_DEFAULT_ENV:-unknown}" >> "$GITHUB_OUTPUT"
          echo "ros_distro=${ROS_DISTRO:-unknown}" >> "$GITHUB_OUTPUT"
          echo "python_version=$(python3 -c 'import platform; print(platform.python_version())')" >> "$GITHUB_OUTPUT"
          echo "::notice::f1ros active: CONDA_DEFAULT_ENV=${CONDA_DEFAULT_ENV:-unknown} ROS_DISTRO=${ROS_DISTRO:-unknown}"

      - name: Build motion_control
        shell: bash -il {0}
        run: |
          if ! f1ros; then
            echo "::error::f1ros 环境激活失败"
            exit 1
          fi
          set -euo pipefail
          MARKER="${{ github.workspace }}/build/.ci-motion-control-source"
          BUILD_DRIVER_SHA="$(
            sha256sum CMakeLists.txt scripts/build.sh |
              sha256sum |
              awk '{print $1}'
          )"
          EXPECTED="${{ steps.source.outputs.mc_sha }}:$BUILD_DRIVER_SHA"
          if [ -f build/aimrt_main ] \
             && [ -f "$MARKER" ] \
             && [ "$(cat "$MARKER")" = "$EXPECTED" ] \
             && [ "${{ inputs.rebuild_mc }}" != "true" ]; then
            echo "::notice::复用 motion_control 构建: $EXPECTED"
          else
            ./scripts/build.sh
            printf '%s\n' "$EXPECTED" > "$MARKER"
          fi

      - name: Build navigation
        shell: bash -il {0}
        run: |
          if ! f1ros; then
            echo "::error::f1ros 环境激活失败"
            exit 1
          fi
          set -euo pipefail
          MARKER="${{ github.workspace }}/navigation/install/.ci-navigation-source"
          BUILD_DRIVER_SHA="$(sha256sum scripts/build_nav.sh | awk '{print $1}')"
          EXPECTED="${{ steps.source.outputs.nav_sha }}:$BUILD_DRIVER_SHA"
          if [ -f navigation/install/setup.bash ] \
             && [ -f "$MARKER" ] \
             && [ "$(cat "$MARKER")" = "$EXPECTED" ] \
             && [ "${{ inputs.rebuild_nav }}" != "true" ]; then
            echo "::notice::复用 navigation 构建: $EXPECTED"
          else
            ./scripts/build_nav.sh
            printf '%s\n' "$EXPECTED" > "$MARKER"
          fi

      - name: Run nav evaluation
        id: test
        continue-on-error: true
        shell: bash -il {0}
        run: |
          if ! f1ros; then
            echo "::error::f1ros 环境激活失败"
            exit 1
          fi
          set -euo pipefail
          SCENARIO="${{ inputs.scenario || 'all' }}"
          echo "scenario=$SCENARIO" >> "$GITHUB_OUTPUT"
          ./scripts/ci_nav_test.sh "$SCENARIO"

      - name: Write evaluation manifest
        if: always() && steps.source.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/nav_eval_manifest.py create \
            --report-dir "$F1_REPORT_DIR" \
            --repo-root "${{ github.workspace }}" \
            --repository "${{ github.repository }}" \
            --workflow "${{ github.workflow_ref }}" \
            --event "${{ github.event_name }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --scenario "${{ inputs.scenario || 'all' }}" \
            --test-outcome "${{ steps.test.outcome }}" \
            --f1-commit "${{ steps.source.outputs.f1_sha }}" \
            --navigation-commit "${{ steps.source.outputs.nav_sha }}" \
            --ros-distro "${{ steps.environment.outputs.ros_distro }}" \
            --conda-environment "${{ steps.environment.outputs.conda_environment }}" \
            --python-version "${{ steps.environment.outputs.python_version }}"

      - name: Extract summary
        if: always()
        shell: bash
        run: |
          python3 - "$F1_REPORT_DIR" >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import json
          import pathlib
          import sys

          report_dir = pathlib.Path(sys.argv[1])
          print("## 导航评测结果\n")
          batches = sorted(report_dir.glob("batch_summary_*.json"))
          if batches:
              results = json.loads(batches[-1].read_text())
          else:
              results = []
              for path in sorted(report_dir.glob("*.json")):
                  if path.name in {"ci_diagnostic.json", "evaluation_manifest.json"}:
                      continue
                  data = json.loads(path.read_text())
                  if "metrics" in data:
                      results.append(data)
          if not results:
              print("未生成场景指标；请查看日志 artifact。")
              raise SystemExit(0)
          passed = sum(bool(r.get("metrics", {}).get("success")) for r in results)
          print(f"**通过率: {passed}/{len(results)}**\n")
          print("| 场景 | 结果 | 摔倒 | 碰撞 | 误差(m) | 漂移(m) |")
          print("|------|------|------|------|---------|---------|")
          for result in results:
              metrics = result.get("metrics", {})
              status = "✅" if metrics.get("success") else "❌"
              fall = "是" if metrics.get("fall") else "否"
              print(
                  f"| {result.get('scenario', '?')} | {status} | {fall} | "
                  f"{metrics.get('collisions', 0)} | "
                  f"{metrics.get('position_error_m', 'N/A')} | "
                  f"{metrics.get('drift_mean_m', 'N/A')} |"
              )
          PY

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.F1_REPORT_DIR }}/
          if-no-files-found: error
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.F1_CI_LOG_DIR }}/
          if-no-files-found: ignore
          retention-days: 7

      - name: Post commit result
        if: always() && github.event_name == 'push'
        uses: actions/github-script@v7
        env:
          TEST_OUTCOME: ${{ steps.test.outcome }}
          NAV_SHA: ${{ steps.source.outputs.nav_sha }}
        with:
          script: |
            const body = [
              '## 🤖 导航评测结果',
              '',
              `测试状态: **${process.env.TEST_OUTCOME}**`,
              `F1 commit: \`${context.sha}\``,
              `navigation commit: \`${process.env.NAV_SHA || 'unavailable'}\``,
              `run/attempt: \`${context.runId}/${process.env.GITHUB_RUN_ATTEMPT}\``,
              '',
              `[完整报告](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `下载并校验: \`python3 scripts/fetch_ci_results.py --run-id ${context.runId}\``,
            ].join('\n');
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });

      - name: Enforce evaluation result
        if: always()
        shell: bash
        run: |
          if [ -f "$F1_REPORT_DIR/infrastructure_failure.json" ]; then
            echo "::error::导航评测基础设施失败；请查看结果和日志 artifact"
            cat "$F1_REPORT_DIR/infrastructure_failure.json"
            exit 2
          fi
          if [ "${{ steps.test.outcome }}" != "success" ]; then
            echo "::error::导航算法评测未通过；指标证据已上传"
            exit 1
          fi
